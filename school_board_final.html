<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة المدرسة - النسخة النهائية</title>
<!-- استيراد خط Cairo من Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --moe-green: #006C35;
    --moe-green-dark: #004d26;
    --gold-color: #D4AF37;
    --gold-gradient: linear-gradient(45deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(160deg, var(--moe-green) 0%, var(--moe-green-dark) 100%);
    color: #ffffff;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 18px 16px;
    gap: 10px;
  }

  /* ── شعار المدرسة ── */
  .logo-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 100%;
  }

  .school-logo {
    width: 100px;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    /* تم إزالة الإطار والخلفية والحدود من هنا */
    border: none;
    background: transparent;
  }

  .school-logo img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  .school-name {
    font-size: 20px;
    font-weight: 700;
    text-align: center;
    color: #ffffff;
    letter-spacing: 0.5px;
    line-height: 1.3;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
  }

  /* ── فاصل ذهبي ── */
  .divider {
    width: 100%;
    height: 2px;
    background: var(--gold-gradient);
    opacity: 0.8;
  }

  /* ── الساعة العقارب ── */
  .clock-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    width: 100%;
  }

  canvas#analogClock {
    display: block;
  }

  .digital-time {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--gold-color);
    font-variant-numeric: tabular-nums;
  }

  /* ── الحصة والبطاقات ── */
  .card {
    background: rgba(0, 0, 0, 0.2);
    border: 1.5px solid var(--gold-color);
    border-radius: 14px;
    padding: 12px 16px;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }

  .card-label {
    font-size: 11px;
    color: var(--gold-color);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 4px;
    font-weight: 700;
  }

  .card-value {
    font-size: 18px;
    font-weight: 700;
    color: #ffffff;
  }

  .period-time {
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    margin-top: 2px;
  }

  /* ── الوقت المتبقي ── */
  #remaining {
    font-size: 36px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    transition: color 0.6s ease;
    color: #ffffff;
  }

  #remaining.warn {
    color: #ffcc00;
    animation: pulse 1.5s ease-in-out infinite;
  }

  #remaining.danger {
    color: #ff3b30;
    animation: pulse 0.8s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  /* ── التواريخ ── */
  .dates-row {
    display: flex;
    gap: 10px;
    width: 100%;
  }

  .dates-row .card {
    flex: 1;
  }
</style>
</head>
<body>

<!-- شعار واسم المدرسة -->
<div class="logo-section">
  <div class="school-logo">
    <img src="https://www.moe.gov.sa/_layouts/15/Portal/Images/Logo.svg?v=2" alt="Logo">
  </div>
  <div class="school-name">ابتدائية الأحنف بن قيس</div>
</div>

<div class="divider"></div>

<!-- الساعة العقارب -->
<div class="clock-section">
  <canvas id="analogClock" width="160" height="160"></canvas>
  <div class="digital-time" id="digitalTime">00:00:00</div>
</div>

<div class="divider"></div>

<!-- الحصة الحالية -->
<div class="card">
  <div class="card-label">الحصة الحالية</div>
  <div class="card-value" id="periodName">—</div>
  <div class="period-time" id="periodTime"></div>
</div>

<!-- الوقت المتبقي -->
<div class="card">
  <div class="card-label">الوقت المتبقي</div>
  <div id="remaining">--:--</div>
</div>

<!-- التواريخ -->
<div class="dates-row">
  <div class="card">
    <div class="card-label">التاريخ الهجري</div>
    <div class="card-value" id="hijriDate">—</div>
  </div>
  <div class="card">
    <div class="card-label">التاريخ الميلادي</div>
    <div class="card-value" id="gregorianDate">—</div>
  </div>
</div>

<script>
const schedule = [
  { name: "الطابور",      start: "07:00", end: "07:20" },
  { name: "الحصة الأولى", start: "07:20", end: "08:00" },
  { name: "الفسحة",       start: "08:00", end: "08:15" },
  { name: "الحصة الثانية",start: "08:15", end: "08:55" },
  { name: "الحصة الثالثة",start: "08:55", end: "09:35" },
  { name: "الفسحة الكبرى",start: "09:35", end: "10:05" },
  { name: "الحصة الرابعة",start: "10:05", end: "10:45" },
  { name: "الحصة الخامسة",start: "10:45", end: "11:25" },
  { name: "الحصة السادسة",start: "11:25", end: "12:05" },
  { name: "انتهاء الدوام", start: "12:05", end: "23:59" },
];

function toMinutes(hhmm) {
  const [h, m] = hhmm.split(":").map(Number);
  return h * 60 + m;
}

function nowMinutes() {
  const n = new Date();
  return n.getHours() * 60 + n.getMinutes();
}

function getCurrentPeriod(now) {
  for (const p of schedule) {
    const s = toMinutes(p.start), e = toMinutes(p.end);
    if (now >= s && now < e) return p;
  }
  return null;
}

function drawAnalogClock(canvas) {
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2, r = W / 2 - 6;
  const now = new Date();
  const sec = now.getSeconds(), min = now.getMinutes(), hr = now.getHours() % 12;

  ctx.clearRect(0, 0, W, H);

  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, 2 * Math.PI);
  ctx.fillStyle = "rgba(0,0,0,0.2)";
  ctx.fill();
  ctx.strokeStyle = "#D4AF37";
  ctx.lineWidth = 2;
  ctx.stroke();

  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * 2 * Math.PI - Math.PI / 2;
    const isMajor = i % 3 === 0;
    const r1 = r - (isMajor ? 12 : 7);
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * r1, cy + Math.sin(a) * r1);
    ctx.lineTo(cx + Math.cos(a) * (r - 2), cy + Math.sin(a) * (r - 2));
    ctx.strokeStyle = isMajor ? "#D4AF37" : "rgba(212, 175, 55, 0.5)";
    ctx.lineWidth = isMajor ? 2 : 1;
    ctx.stroke();
  }

  function drawHand(angle, length, width, color) {
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(angle) * length, cy + Math.sin(angle) * length);
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.lineCap = "round";
    ctx.stroke();
  }

  const hrAngle  = ((hr + min / 60) / 12) * 2 * Math.PI - Math.PI / 2;
  const minAngle = ((min + sec / 60) / 60) * 2 * Math.PI - Math.PI / 2;
  const secAngle = (sec / 60) * 2 * Math.PI - Math.PI / 2;

  drawHand(hrAngle,  r * 0.50, 4, "#ffffff");
  drawHand(minAngle, r * 0.70, 2.5, "#e0e0e0");
  drawHand(secAngle, r * 0.80, 1.5, "#D4AF37");

  ctx.beginPath();
  ctx.arc(cx, cy, 4, 0, 2 * Math.PI);
  ctx.fillStyle = "#D4AF37";
  ctx.fill();
}

function pad2(n) { return String(n).padStart(2, "0"); }

function updateDigitalTime() {
  const n = new Date();
  document.getElementById("digitalTime").textContent =
    `${pad2(n.getHours())}:${pad2(n.getMinutes())}:${pad2(n.getSeconds())}`;
}

function updatePeriod() {
  const now = nowMinutes();
  const period = getCurrentPeriod(now);
  const remEl = document.getElementById("remaining");

  if (!period) {
    document.getElementById("periodName").textContent = "لا توجد حصة";
    document.getElementById("periodTime").textContent = "";
    remEl.textContent = "--:--";
    remEl.className = "";
    return;
  }

  document.getElementById("periodName").textContent = period.name;
  document.getElementById("periodTime").textContent =
    `${period.start} – ${period.end}`;

  const endMin = toMinutes(period.end);
  const remaining = endMin - now;
  const remSec = remaining * 60 - new Date().getSeconds();
  const dispMin = Math.floor(remSec / 60);
  const dispSec = remSec % 60;

  if (remSec <= 0) {
    remEl.textContent = "00:00";
    remEl.className = "danger";
  } else {
    remEl.textContent = `${pad2(dispMin)}:${pad2(dispSec)}`;
    if (dispMin < 1) {
      remEl.className = "danger";
    } else if (dispMin < 5) {
      remEl.className = "warn";
    } else {
      remEl.className = "";
    }
  }
}

function updateDates() {
  const now = new Date();
  document.getElementById("gregorianDate").textContent =
    now.toLocaleDateString("ar-SA", { day: "numeric", month: "long", year: "numeric" });
  document.getElementById("hijriDate").textContent =
    now.toLocaleDateString("ar-SA-u-ca-islamic", { day: "numeric", month: "long", year: "numeric" });
}

const canvas = document.getElementById("analogClock");
function tick() {
  drawAnalogClock(canvas);
  updateDigitalTime();
  updatePeriod();
}

updateDates();
setInterval(updateDates, 60000);
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
